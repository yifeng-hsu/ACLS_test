<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACLS 全路徑訓練系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Main Menu -->
        <div id="main-menu" class="view active glass-panel">
            <h1 class="title-gradient">ACLS 2025<br>全路徑訓練系統</h1>
            <p class="subtitle">提升您的急救決策能力</p>
            <div class="menu-buttons">
                <button id="btn-learning-mode" class="btn primary-btn">學習模式</button>
                <button id="btn-test-mode" class="btn secondary-btn">考試模式</button>
            </div>
        </div>

        <!-- Path Selection (Learning Mode) -->
        <div id="path-selection" class="view glass-panel">
            <h2>選擇要練習的路徑</h2>
            <div id="path-list" class="path-grid">
                <!-- Dynamically populated by JS -->
            </div>
            <button id="btn-back-menu" class="btn ghost-btn">返回主選單</button>
        </div>

        <!-- Scenario View -->
        <div id="scenario-view" class="view glass-panel">
            <div class="scenario-header">
                <h2 id="scenario-title">情境名稱</h2>
                <div class="mode-badge" id="mode-badge">模式</div>
            </div>
            
            <div class="scenario-content">
                <div class="scenario-description">
                    <p id="scenario-text">情境描述將在這裡顯示...</p>
                </div>

                <div class="feedback-box" id="feedback-box" style="display: none;">
                    <p id="feedback-text"></p>
                </div>

                <form id="action-form" class="action-form">
                    <div class="form-group">
                        <label for="treatment-select">處置</label>
                        <select id="treatment-select" required>
                            <!-- Options populated by JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="drug-select">藥物</label>
                        <select id="drug-select">
                            <!-- Options populated by JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="value-input">數值 (劑量/焦耳數)</label>
                        <input type="number" id="value-input" step="any" placeholder="請輸入數值">
                    </div>

                    <div class="form-group">
                        <label for="unit-select">單位</label>
                        <select id="unit-select">
                            <!-- Options populated by JS -->
                        </select>
                    </div>

                    <button type="submit" class="btn submit-btn">確認處置</button>
                </form>
            </div>
            <div class="scenario-footer">
                <button id="btn-quit-scenario" class="btn ghost-btn">放棄並返回</button>
            </div>
        </div>
        
        <!-- Result View -->
        <div id="result-view" class="view glass-panel">
            <h2 id="result-title">完成！</h2>
            <p id="result-message">您已成功走完此路徑。</p>
            <div id="test-stats" style="display: none;">
                <p>錯誤次數: <span id="error-count">0</span></p>
            </div>
            <div class="menu-buttons">
                <button id="btn-result-next" class="btn primary-btn">下一題</button>
                <button id="btn-result-home" class="btn secondary-btn">回主選單</button>
            </div>
        </div>
    </div>
    <script src="pathways.js"></script>
    <script src="app.js"></script>
</body>
</html>
