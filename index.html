<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACLS 2026 全邏輯演繹模擬器</title>
    <style>
        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --border-color: #334155;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #10b981; --accent-hover: #059669;
            --error: #ef4444; --error-bg: rgba(239, 68, 68, 0.1);
            --warn: #f59e0b;
        }
        body {
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 900px;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: var(--accent); text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 0; }
        
        .scenario-select { margin-bottom: 20px; }
        .scenario-box {
            background: #000; border-left: 5px solid var(--warn);
            padding: 20px; font-size: 1.1em; line-height: 1.6; border-radius: 4px; margin-bottom: 30px;
        }

        .section {
            border: 1px solid var(--border-color); border-radius: 8px;
            padding: 20px; margin-bottom: 20px; background: rgba(0,0,0,0.2);
            display: none; /* Hidden by default */
        }
        .section-title { font-size: 1.2em; color: var(--accent); margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        label { color: var(--text-muted); font-size: 0.9em; margin-bottom: 5px; font-weight: bold; }
        
        select, input[type="text"], input[type="number"] {
            background: #0f172a; color: #fff; border: 1px solid var(--border-color);
            padding: 10px; border-radius: 6px; font-size: 1em; outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }
        
        .btn {
            background: var(--accent); color: #fff; border: none;
            padding: 12px 20px; font-size: 1em; font-weight: bold;
            border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px;
            transition: 0.2s;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { background: var(--border-color); color: #64748b; cursor: not-allowed; }

        .treatment-row {
            display: grid; grid-template-columns: 2fr 2fr 1fr; gap: 10px; margin-bottom: 15px;
            background: #0f172a; padding: 15px; border-radius: 8px; border: 1px dashed var(--border-color);
        }

        .feedback {
            padding: 15px; border-radius: 6px; margin-top: 15px; display: none; font-weight: bold;
        }
        .feedback.success { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid #10b981; }
        .feedback.error { background: var(--error-bg); color: #f87171; border: 1px solid var(--error); }
    </style>
</head>
<body>

<div class="container">
    <h1>ACLS 2026 全邏輯演繹模擬器</h1>
    
    <div class="scenario-select">
        <label>請選擇病患情境 (Case)：</label>
        <select id="caseSelector" onchange="loadCase()">
            <option value="">-- 點擊此處選擇情境開始 --</option>
            <option value="VF">Case 1: 突然倒下無反應 (心室顫動)</option>
            <option value="PEA">Case 2: 創傷後心跳停止 (PEA)</option>
            <option value="BRADY_UNSTABLE">Case 3: 嚴重胸痛伴隨心跳過慢</option>
            <option value="TACHY_PSVT">Case 4: 年輕女性突發心悸 (穩定PSVT)</option>
            <option value="TACHY_AF_HF">Case 5: 喘息伴隨不規則心跳 (Af合併心衰竭)</option>
            <option value="TACHY_TORSADES">Case 6: 寬波不規則心跳 (QT延長)</option>
            <option value="TACHY_UNSTABLE">Case 7: 意識模糊伴隨心跳極快 (不穩定過速)</option>
        </select>
    </div>

    <div id="scenarioBox" class="scenario-box" style="display:none;"></div>

    <div id="sectionEval" class="section">
        <h3 class="section-title">第一階段：臨床與 EKG 綜合評估</h3>
        <div class="grid-form">
            <div class="form-group">
                <label>1. 脈搏狀態</label>
                <select id="eval_pulse" onchange="updateEvalFields()">
                    <option value="">請選擇...</option><option value="有">有脈搏</option><option value="無">無脈搏</option>
                </select>
            </div>
            <div class="form-group" id="group_shock" style="display:none;">
                <label>2. 節律判斷 (無脈搏)</label>
                <select id="eval_shock">
                    <option value="">請選擇...</option><option value="可電擊">可電擊 (VF/pVT)</option><option value="不可電擊">不可電擊 (Asystole/PEA)</option>
                </select>
            </div>
            <div class="form-group" id="group_stability" style="display:none;">
                <label>2. 生命徵象穩定度</label>
                <select id="eval_stability">
                    <option value="">請選擇...</option><option value="穩定">穩定 (無症狀)</option><option value="不穩定">不穩定 (痛/喘/昏/休克)</option>
                </select>
            </div>
            <div class="form-group" id="group_rate" style="display:none;">
                <label>3. 心率分類</label>
                <select id="eval_rate" onchange="updateEvalFields()">
                    <option value="">請選擇...</option><option value="慢">心搏過慢 (HR < 50)</option><option value="快">心搏過速 (HR ≥ 150)</option>
                </select>
            </div>
            <div class="form-group" id="group_qrs" style="display:none;">
                <label>4. QRS波寬度</label>
                <select id="eval_qrs" onchange="updateEvalFields()">
                    <option value="">請選擇...</option><option value="窄">窄波 (< 0.12秒)</option><option value="寬">寬波 (≥ 0.12秒)</option>
                </select>
            </div>
            <div class="form-group" id="group_reg" style="display:none;">
                <label>5. 規則性 (R-R間距)</label>
                <select id="eval_reg" onchange="updateEvalFields()">
                    <option value="">請選擇...</option><option value="規則">規則</option><option value="不規則">不規則</option>
                </select>
            </div>
            <div class="form-group" id="group_pwave" style="display:none;">
                <label>6. P波判定</label>
                <select id="eval_pwave">
                    <option value="">請選擇...</option><option value="有">有 P波</option><option value="無">無 P波</option>
                </select>
            </div>
            <div class="form-group" id="group_hf" style="display:none;">
                <label>6. 心衰竭徵候 (肺囉音/頸靜脈怒張)</label>
                <select id="eval_hf">
                    <option value="">請選擇...</option><option value="有">有心衰竭</option><option value="無">無心衰竭</option>
                </select>
            </div>
            <div class="form-group" id="group_qt" style="display:none;">
                <label>6. QT區間</label>
                <select id="eval_qt">
                    <option value="">請選擇...</option><option value="延長">QT延長</option><option value="正常">QT正常</option>
                </select>
            </div>
        </div>
        <button class="btn" id="btnEval" onclick="checkEvaluation()">確認評估結果</button>
        <div id="fbEval" class="feedback"></div>
    </div>

    <div id="sectionT1" class="section">
        <h3 class="section-title" id="titleT1">第二階段：首選第一線處置</h3>
        <div class="treatment-row">
            <div class="form-group">
                <label>處置類別</label>
                <select id="t1_action">
                    <option value="">請選擇...</option>
                    <option value="去顫(非同步)">去顫 (非同步電擊)</option>
                    <option value="同步心臟整流">同步心臟整流</option>
                    <option value="給藥">給予藥物</option>
                    <option value="迷走神經刺激">迷走神經刺激</option>
                    <option value="高品質CPR">持續高品質 CPR</option>
                </select>
            </div>
            <div class="form-group">
                <label>藥物選擇 (若適用)</label>
                <select id="t1_drug">
                    <option value="無">-- 無需藥物 --</option>
                    <option value="Epinephrine">Epinephrine</option>
                    <option value="Atropine">Atropine</option>
                    <option value="Adenosine">Adenosine</option>
                    <option value="Amiodarone">Amiodarone</option>
                    <option value="Lidocaine">Lidocaine</option>
                    <option value="Diltiazem">Diltiazem</option>
                    <option value="Verapamil">Verapamil</option>
                    <option value="Digoxin">Digoxin</option>
                    <option value="MgSO4">MgSO4</option>
                </select>
            </div>
            <div class="form-group">
                <label>劑量(mg) / 焦耳(J)</label>
                <input type="text" id="t1_val" placeholder="數值">
            </div>
        </div>
        <button class="btn" id="btnT1" onclick="checkTreatment(1)">確認執行第一線處置</button>
        <div id="fbT1" class="feedback"></div>
    </div>

    <div id="sectionT2" class="section">
        <h3 class="section-title" id="titleT2">第三階段：若首選無效之後續 / 第二線處置</h3>
        <div class="treatment-row">
            <div class="form-group">
                <label>處置類別</label>
                <select id="t2_action">
                    <option value="">請選擇...</option>
                    <option value="去顫(非同步)">去顫 (非同步電擊)</option>
                    <option value="給藥">給予藥物</option>
                    <option value="啟動TCP">啟動 TCP (經皮心律調節器)</option>
                    <option value="尋找原因">尋找 5H/5T 原因</option>
                </select>
            </div>
            <div class="form-group">
                <label>藥物選擇 (若適用)</label>
                <select id="t2_drug">
                    <option value="無">-- 無需藥物 --</option>
                    <option value="Epinephrine">Epinephrine</option>
                    <option value="Amiodarone">Amiodarone</option>
                    <option value="Adenosine">Adenosine</option>
                    <option value="Dopamine">Dopamine</option>
                </select>
            </div>
            <div class="form-group">
                <label>劑量(mg) / 焦耳(J)</label>
                <input type="text" id="t2_val" placeholder="數值">
            </div>
        </div>
        <button class="btn" id="btnT2" onclick="checkTreatment(2)">確認執行後續處置</button>
        <div id="fbT2" class="feedback"></div>
    </div>

</div>

<script>
    // 定義所有情境與正確解答邏輯
    const cases = {
        "VF": {
            text: "【急救現場】病患突然倒地，無呼吸無反應。Monitor 接上後顯示極度混亂、毫無規律也無 QRS 結構的波形。",
            eval: { pulse: "無", shock: "可電擊" },
            t1: { action: "去顫(非同步)", val: "200", msg: "正確！發現 VF 應立即以 200J 進行去顫，並馬上接續 CPR。" },
            t2_title: "第三階段：完成第二次電擊後，應給予什麼藥物？",
            t2: [{ action: "給藥", drug: "Epinephrine", val: ["1"] }],
            t2_msg: "正確！電擊兩次後給予 Epinephrine 1mg。後續第三次電擊後再給 Amiodarone。"
        },
        "PEA": {
            text: "【急救現場】病患車禍後無呼吸無反應。Monitor 顯示平緩無波幅的平線 (Asystole)。已開始 CPR。",
            eval: { pulse: "無", shock: "不可電擊" },
            t1: { action: "給藥", drug: "Epinephrine", val: "1", msg: "正確！不可電擊心律首要就是 CPR 並儘速給予 Epinephrine 1mg。(不可使用Atropine)" },
            t2_title: "第三階段：給藥並持續 CPR 中，下一步最關鍵的處置方向是？",
            t2: [{ action: "尋找原因" }],
            t2_msg: "正確！Asystole/PEA 必須盡快尋找並排除 5H/5T 的可逆原因 (如低血容、張力性氣胸等)。"
        },
        "BRADY_UNSTABLE": {
            text: "【急救現場】65歲男性，主訴嚴重胸痛與冷汗。血壓 70/40 mmHg。Monitor: HR 38 次/分。",
            eval: { pulse: "有", stability: "不穩定", rate: "慢" },
            t1: { action: "給藥", drug: "Atropine", val: "1", msg: "正確！不穩定心搏過慢首選 Atropine 1mg (最大上限3mg)。" },
            t2_title: "第三階段：若 Atropine 給予後依然無效，請選擇第二線替代方案：",
            t2: [
                { action: "啟動TCP" },
                { action: "給藥", drug: "Dopamine", val: ["5", "10", "15", "20"] },
                { action: "給藥", drug: "Epinephrine", val: ["2", "5", "10"] }
            ],
            t2_msg: "正確！Atropine 無效時，應選擇 TCP，或是給予 Dopamine (5-20 mcg/kg/min) / Epinephrine (2-10 mcg/min) 滴注。"
        },
        "TACHY_PSVT": {
            text: "【急救現場】30歲女性，突發心悸。血壓 120/80 mmHg，無不適。Monitor: HR 175 次/分，QRS 寬度 0.08秒，R-R間距一致，波形中未見 P波。",
            eval: { pulse: "有", stability: "穩定", rate: "快", qrs: "窄", reg: "規則", pwave: "無" },
            t1: { action: "迷走神經刺激", msg: "正確！穩定窄頸規則無 P波為 PSVT，首選為迷走神經刺激術。" },
            t2_title: "第三階段：若迷走神經刺激無效，請選擇第一線藥物與首劑劑量：",
            t2: [{ action: "給藥", drug: "Adenosine", val: ["6"] }],
            t2_msg: "正確！給予 Adenosine 6mg 快速推注。若再無效則考慮給予 12mg。"
        },
        "TACHY_AF_HF": {
            text: "【急救現場】70歲男性，主訴喘息。聽診有雙側肺部底層囉音(心衰竭)。血壓 130/85 mmHg。Monitor: HR 155 次/分，QRS 0.10秒，R-R間距不規則。",
            eval: { pulse: "有", stability: "穩定", rate: "快", qrs: "窄", reg: "不規則", hf: "有" },
            t1: { action: "給藥", drug: "Amiodarone", val: "150", msg: "正確！心搏過速、窄頸不規則(Af) 若「合併心衰竭」，應使用 Amiodarone 150mg (或Digoxin)。不可使用 Diltiazem 等鈣離子阻斷劑。" },
            t2: null // 此情境演練到此
        },
        "TACHY_TORSADES": {
            text: "【急救現場】55歲女性，曾有 QT 延長病史。血壓 110/70 mmHg。Monitor: HR 160 次/分，波形寬大變形，振幅忽大忽小(多型性VT)。",
            eval: { pulse: "有", stability: "穩定", rate: "快", qrs: "寬", reg: "不規則", qt: "延長" },
            t1: { action: "給藥", drug: "MgSO4", val: "1", msg: "正確！QT 延長之多型性 VT (Torsades de pointes) 必須給予 MgSO4 1-2g 滴注。絕對不可給 Amiodarone！" },
            t2_title: "第三階段：若病患突然失去意識，血壓量不到，下一步處置為？",
            t2: [{ action: "去顫(非同步)", val: ["200"] }],
            t2_msg: "正確！若多型性 VT 轉為不穩定或無脈搏，應立即以 200J 進行非同步去顫。"
        },
        "TACHY_UNSTABLE": {
            text: "【急救現場】50歲男性，主訴嚴重呼吸困難且意識模糊。血壓 75/40 mmHg。Monitor: HR 180 次/分，QRS 0.08秒。",
            eval: { pulse: "有", stability: "不穩定", rate: "快" },
            t1: { action: "同步心臟整流", val: "100", msg: "正確！有脈搏且不穩定之心搏過速，無論寬窄，第一線處置皆為「同步心臟整流」(預設100J)。" },
            t2: null
        }
    };

    let currentCase = null;

    function loadCase() {
        const val = document.getElementById('caseSelector').value;
        if (!val) return;
        currentCase = cases[val];
        
        document.getElementById('scenarioBox').style.display = 'block';
        document.getElementById('scenarioBox').innerText = currentCase.text;
        
        // 顯示並重置評估區
        document.getElementById('sectionEval').style.display = 'block';
        document.getElementById('sectionT1').style.display = 'none';
        document.getElementById('sectionT2').style.display = 'none';
        
        // 清空所有 input/select
        document.querySelectorAll('select, input').forEach(el => {
            if (el.id !== 'caseSelector') el.value = '';
        });
        document.getElementById('t1_drug').value = '無';
        document.getElementById('t2_drug').value = '無';
        
        document.querySelectorAll('.feedback').forEach(el => el.style.display = 'none');
        updateEvalFields();
    }

    function updateEvalFields() {
        const pulse = document.getElementById('eval_pulse').value;
        const rate = document.getElementById('eval_rate').value;
        const qrs = document.getElementById('eval_qrs').value;
        const reg = document.getElementById('eval_reg').value;

        document.getElementById('group_shock').style.display = (pulse === '無') ? 'flex' : 'none';
        
        const hasPulse = (pulse === '有');
        document.getElementById('group_stability').style.display = hasPulse ? 'flex' : 'none';
        document.getElementById('group_rate').style.display = hasPulse ? 'flex' : 'none';
        
        const isTachy = (hasPulse && rate === '快');
        document.getElementById('group_qrs').style.display = isTachy ? 'flex' : 'none';
        document.getElementById('group_reg').style.display = isTachy ? 'flex' : 'none';
        
        document.getElementById('group_pwave').style.display = (isTachy && qrs === '窄' && reg === '規則') ? 'flex' : 'none';
        document.getElementById('group_hf').style.display = (isTachy && qrs === '窄' && reg === '不規則') ? 'flex' : 'none';
        document.getElementById('group_qt').style.display = (isTachy && qrs === '寬' && reg === '不規則') ? 'flex' : 'none';
    }

    function showFeedback(id, isSuccess, msg) {
        const el = document.getElementById(id);
        el.style.display = 'block';
        el.className = 'feedback ' + (isSuccess ? 'success' : 'error');
        el.innerHTML = (isSuccess ? '✅ ' : '❌ ') + msg;
    }

    function checkEvaluation() {
        const expected = currentCase.eval;
        let isCorrect = true;
        
        const checkField = (fieldId, expectedKey) => {
            if (expected[expectedKey] && document.getElementById(fieldId).value !== expected[expectedKey]) {
                isCorrect = false;
            }
        };

        checkField('eval_pulse', 'pulse');
        checkField('eval_shock', 'shock');
        checkField('eval_stability', 'stability');
        checkField('eval_rate', 'rate');
        checkField('eval_qrs', 'qrs');
        checkField('eval_reg', 'reg');
        checkField('eval_pwave', 'pwave');
        checkField('eval_hf', 'hf');
        checkField('eval_qt', 'qt');

        if (isCorrect) {
            showFeedback('fbEval', true, "診斷邏輯完全正確！請進行下一步第一線處置。");
            document.getElementById('sectionT1').style.display = 'block';
            document.getElementById('btnEval').disabled = true;
        } else {
            showFeedback('fbEval', false, "診斷邏輯有誤！請重新檢視患者的生命徵象與 EKG 規則。");
        }
    }

    function checkTreatment(step) {
        if (step === 1) {
            const exp = currentCase.t1;
            const action = document.getElementById('t1_action').value;
            const drug = document.getElementById('t1_drug').value;
            const val = document.getElementById('t1_val').value;

            let correct = true;
            if (exp.action !== action) correct = false;
            if (exp.drug && exp.drug !== drug) correct = false;
            // 劑量寬容度 (例如 MgSO4 1-2)
            if (exp.val) {
                if (exp.drug === 'MgSO4' && (val === '1' || val === '2' || val === '1.5')) { /* ok */ }
                else if (val !== exp.val) correct = false;
            }

            if (correct) {
                showFeedback('fbT1', true, exp.msg);
                document.getElementById('btnT1').disabled = true;
                if (currentCase.t2) {
                    document.getElementById('sectionT2').style.display = 'block';
                    document.getElementById('titleT2').innerText = currentCase.t2_title;
                }
            } else {
                showFeedback('fbT1', false, "處置選擇有誤，或劑量/焦耳數不正確。");
            }
        } else if (step === 2) {
            const options = currentCase.t2;
            const action = document.getElementById('t2_action').value;
            const drug = document.getElementById('t2_drug').value;
            const val = document.getElementById('t2_val').value;

            let isCorrect = false;
            for (let opt of options) {
                let match = true;
                if (opt.action !== action) match = false;
                if (opt.drug && opt.drug !== drug) match = false;
                if (opt.val && !opt.val.includes(val)) match = false;
                if (match) isCorrect = true;
            }

            if (isCorrect) {
                showFeedback('fbT2', true, currentCase.t2_msg);
                document.getElementById('btnT2').disabled = true;
            } else {
                showFeedback('fbT2', false, "處置選擇有誤，或劑量/焦耳數不正確。");
            }
        }
    }
</script>

</body>
</html>
